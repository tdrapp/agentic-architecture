name: doc-freshness

# Weekly self-challenge: are the primary Anthropic/OpenAI docs still saying what this skill claims?
# On drift it opens an issue (a visible, honest signal) — it does NOT auto-commit a re-pin, which
# would silently hide the drift and pad the commit graph.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check doc freshness
        id: check
        run: |
          python scripts/doc_freshness_check.py --check | tee report.json
          drift=$(python -c "import json;d=json.load(open('report.json'));print(d['summary']['drifted'])")
          echo "drift=$drift" >> "$GITHUB_OUTPUT"
      - name: Open an issue on drift
        if: steps.check.outputs.drift != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Doc drift detected — review tracked sources" \
            --body "$(cat report.json)" \
            --label "doc-drift" || true
