name: doc-freshness

# Weekly self-challenge: are the primary Anthropic/OpenAI docs still saying what this skill claims?
# On drift it opens an issue (a visible, honest signal) — it does NOT auto-commit a re-pin, which
# would silently hide the drift and pad the commit graph.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check doc freshness
        id: check
        run: |
          python scripts/doc_freshness_check.py --check | tee report.json
          # Alert only on claim loss (actionable). PAGE-CHANGED is informational — many doc pages
          # are dynamic (SPA/PDF) and their byte hash churns without the guidance changing.
          missing=$(python -c "import json;print(json.load(open('report.json'))['summary']['claim_missing'])")
          echo "claim_missing=$missing" >> "$GITHUB_OUTPUT"
      - name: Open an issue when a tracked claim disappears
        if: steps.check.outputs.claim_missing != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Doc drift: a tracked claim is missing — review sources" \
            --body "$(cat report.json)" \
            --label "doc-drift" || true
